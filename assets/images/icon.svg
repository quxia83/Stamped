<svg xmlns="http://www.w3.org/2000/svg" width="1024" height="1024" viewBox="0 0 1024 1024">
  <!-- Background: no rounded corners — iOS applies its own superellipse mask -->
  <rect width="1024" height="1024" fill="#e94560"/>

  <!-- Outer dashed stamp ring -->
  <circle cx="512" cy="480" r="300" fill="none" stroke="#ffffff" stroke-width="42" stroke-dasharray="94 47" transform="rotate(-15, 512, 480)"/>

  <!-- Inner filled circle -->
  <circle cx="512" cy="480" r="194" fill="#ffffff"/>

  <!-- Checkmark inside circle -->
  <polyline points="420,480 488,548 604,412" fill="none" stroke="#e94560" stroke-width="52" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Pin tail -->
  <polygon points="458,654 512,820 566,654" fill="#ffffff"/>

  <!-- Map pin drop shadow hint -->
  <ellipse cx="512" cy="840" rx="110" ry="22" fill="#ffffff" opacity="0.2"/>
</svg>
