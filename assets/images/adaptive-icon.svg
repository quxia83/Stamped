<svg xmlns="http://www.w3.org/2000/svg" width="1024" height="1024" viewBox="0 0 1024 1024">
  <!-- Transparent background for adaptive icon (Android applies its own shape mask) -->

  <!-- Outer dashed stamp ring -->
  <circle cx="512" cy="460" r="280" fill="none" stroke="#e94560" stroke-width="38" stroke-dasharray="88 44" transform="rotate(-15, 512, 460)"/>

  <!-- Inner filled circle -->
  <circle cx="512" cy="460" r="180" fill="#e94560"/>

  <!-- Checkmark inside circle -->
  <polyline points="422,460 484,522 602,384" fill="none" stroke="#ffffff" stroke-width="48" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Pin tail -->
  <polygon points="462,620 512,780 562,620" fill="#e94560"/>
</svg>
